<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7e8" />
  <title>發票神探｜1分鐘對獎挑戰</title>
  <style>
    :root{
      --ink:#283044;
      --muted:#6f7787;
      --cream:#fff7e8;
      --paper:#fffdf8;
      --orange:#f7941d;
      --yellow:#f6c54e;
      --blue:#4f8cc9;
      --green:#2f9e72;
      --red:#dc5c5c;
      --shadow:0 12px 30px rgba(60,48,28,.13);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:
      radial-gradient(circle at 15% 10%,#fff 0 5%,transparent 20%),
      linear-gradient(180deg,#fffaf0 0%,#fff3d9 100%);color:var(--ink)}
    button{font:inherit}
    .app{min-height:100dvh;display:flex;justify-content:center;padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom)}
    .shell{width:min(100%,520px);height:100dvh;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    .screen{display:none;flex:1}
    .screen.active{display:flex;flex-direction:column}
    .center{justify-content:center;align-items:center;text-align:center;padding:28px 10px}
    .logo{width:96px;height:96px;border-radius:26px;background:linear-gradient(145deg,var(--yellow),var(--orange));
      display:grid;place-items:center;font-size:48px;box-shadow:var(--shadow);transform:rotate(-3deg);margin-bottom:22px}
    h1{font-size:clamp(30px,8vw,44px);line-height:1.08;margin:0 0 10px;font-weight:900;letter-spacing:-1px}
    .subtitle{font-weight:800;color:var(--orange);font-size:19px;margin-bottom:16px}
    .intro{max-width:380px;color:var(--muted);line-height:1.75;margin:0 auto 24px}
    .rule-card{width:100%;max-width:420px;background:rgba(255,255,255,.78);border:2px solid rgba(247,148,29,.2);
      border-radius:22px;padding:18px;text-align:left;box-shadow:var(--shadow);margin-bottom:24px}
    .rule-card div{display:flex;gap:10px;align-items:flex-start;margin:8px 0;line-height:1.45}
    .primary{border:0;border-radius:18px;background:linear-gradient(135deg,var(--orange),#ffb13b);color:white;
      min-height:58px;padding:0 32px;font-weight:900;font-size:20px;box-shadow:0 9px 0 #d97808,0 15px 24px rgba(247,148,29,.25);
      cursor:pointer}
    .primary:active{transform:translateY(5px);box-shadow:0 4px 0 #d97808}
    .topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:6px 2px 4px;z-index:5}
    .stat{background:rgba(255,255,255,.86);border:1px solid rgba(79,140,201,.13);border-radius:14px;padding:6px 9px;box-shadow:0 4px 12px rgba(45,55,80,.07)}
    .stat small{display:block;font-size:10px;color:var(--muted);font-weight:700}
    .stat strong{display:block;font-size:16px;line-height:1.15}
    .stat.right{text-align:right}
    .timer{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--orange) 100%,#eadfce 0);position:relative;box-shadow:0 6px 16px rgba(60,48,28,.12)}
    .timer::before{content:"";position:absolute;inset:6px;border-radius:50%;background:#fffaf0}
    .timer span{position:relative;font-weight:900;font-size:19px}
    .timer.danger{animation:pulse .65s infinite}
    @keyframes pulse{50%{transform:scale(1.06)}}
    .progress{height:5px;background:#eadfce;border-radius:99px;overflow:hidden;margin:0 4px 7px}
    .progress i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .25s linear}
    .draw-card{background:linear-gradient(145deg,#2f73b8,var(--blue));color:white;border-radius:20px;padding:12px 16px;text-align:center;box-shadow:0 7px 18px rgba(60,48,28,.12);margin:0 2px 8px;position:relative;overflow:hidden}
    .draw-card::after{content:"";position:absolute;width:130px;height:130px;border:24px solid rgba(255,255,255,.08);border-radius:50%;right:-50px;top:-55px}
    .draw-label{font-size:11px;font-weight:800;letter-spacing:1.5px;opacity:.88}
    .draw-number{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:clamp(28px,7.5vw,38px);font-weight:1000;letter-spacing:1px;margin-top:2px}
    .prompt{text-align:center;font-weight:1000;font-size:clamp(17px,4.7vw,22px);margin:1px 0 7px;letter-spacing:.2px}
    .tickets{display:grid;grid-template-rows:repeat(3,minmax(0,1fr));gap:7px;padding:0 2px 6px;flex:1;min-height:0}
    .ticket{width:100%;border:0;background:transparent;padding:0;cursor:pointer;text-align:left}
    .ticket:disabled{cursor:default}
    .paper{height:100%;background:linear-gradient(180deg,#fffefa 0%,#fffaf1 100%);border:1.5px solid #ead6b5;border-radius:15px;box-shadow:0 5px 14px rgba(85,63,28,.09);padding:13px 16px 12px;position:relative;overflow:hidden;transition:.16s ease;display:flex;flex-direction:column;justify-content:center}
    .paper::after{
      content:"";
      position:absolute;
      left:16px;
      right:16px;
      bottom:-1px;
      height:10px;
      background:
        radial-gradient(circle at 5px 0,#fff3d9 0 5px,transparent 5.5px) 0 0/18px 10px repeat-x;
      pointer-events:none
    }
    .ticket:not(:disabled):active .paper{transform:scale(.985)}
    .choice-tag{position:absolute;left:0;top:0;min-width:40px;min-height:40px;display:grid;place-items:center;background:linear-gradient(145deg,#ffd66f,#f6c54e);color:#14223a;font-weight:1000;font-size:20px;padding:0 10px;border-radius:0 0 13px 0}
    .ticket-head{text-align:center;color:#1d2638;font-size:14px;font-weight:900;letter-spacing:1.2px;margin-bottom:6px}
    .ticket-rule{border-top:2px dotted #bfa77f;margin:0 0 4px}
    .ticket-number{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;text-align:center;font-size:clamp(25px,7.4vw,34px);font-weight:1000;letter-spacing:.2px;margin:3px 0 5px;color:#111d33}
    .ticket-foot{border-top:2px dotted #bfa77f;padding-top:6px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;color:#1f2a3c;font-size:11px;font-weight:700}
    .ticket-date{white-space:nowrap}
    .ticket-amount{white-space:nowrap}
    .ticket-amount b{color:var(--orange);font-size:16px}
    .ticket.correct .paper{border:3px solid var(--green);background:#effbf5;transform:translateY(-2px)}
    .ticket.wrong .paper{border:3px solid var(--red);background:#fff3f3}
    .ticket.dim .paper{opacity:.62}
    .prize-reveal{display:none;text-align:center;font-size:14px;font-weight:900;margin-top:2px}
    .ticket.revealed .prize-reveal{display:block}
    .feedback{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.7);z-index:20;opacity:0;pointer-events:none;
      border-radius:22px;padding:18px 26px;font-size:24px;font-weight:900;color:white;box-shadow:var(--shadow);transition:.2s}
    .feedback.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .feedback.ok{background:var(--green)}.feedback.no{background:var(--red)}
    .combo-pop{position:fixed;left:50%;top:27%;transform:translate(-50%,-50%) rotate(-4deg);z-index:21;color:var(--orange);
      font-size:30px;font-weight:1000;text-shadow:0 3px white,0 6px 18px rgba(0,0,0,.2);animation:combo .8s both;pointer-events:none}
    @keyframes combo{0%{opacity:0;transform:translate(-50%,-10%) scale(.4) rotate(-10deg)}45%{opacity:1;transform:translate(-50%,-50%) scale(1.18) rotate(3deg)}100%{opacity:0;transform:translate(-50%,-85%) scale(.9)}}
    .result-card{width:100%;max-width:430px;background:rgba(255,255,255,.9);border-radius:26px;padding:24px;box-shadow:var(--shadow);margin:20px 0}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .result-item{background:#fff7e8;border-radius:17px;padding:15px}
    .result-item small{display:block;color:var(--muted);font-weight:700;margin-bottom:4px}
    .result-item strong{font-size:23px}
    .total{grid-column:1/-1;background:linear-gradient(135deg,#fff2c6,#ffe4ad)}
    .total strong{font-size:28px;color:#bd6504}
    .rank{font-size:31px;font-weight:1000;color:var(--blue);margin:8px 0 0}
    .secondary{border:2px solid var(--blue);color:var(--blue);background:white;border-radius:16px;min-height:52px;padding:0 25px;font-weight:900;font-size:17px;cursor:pointer}
    .fine{font-size:11px;color:var(--muted);margin-top:17px;line-height:1.5}
    @media (min-width:700px){.shell{padding-bottom:10px}.tickets{grid-template-columns:1fr}.paper{min-height:0}.ticket-number{font-size:34px}}
  
    @media (max-height:740px){
      .topbar{padding-top:3px}
      .timer{width:56px;height:56px}
      .timer span{font-size:17px}
      .draw-card{padding:9px 14px;margin-bottom:5px}
      .draw-number{font-size:28px}
      .prompt{font-size:16px;margin-bottom:5px}
      .tickets{gap:5px}
      .paper{padding:10px 14px 9px}
      .ticket-head{font-size:12px;margin-bottom:4px}
      .ticket-number{font-size:24px;margin:2px 0 3px}
      .ticket-foot{font-size:10px;padding-top:4px}
      .ticket-amount b{font-size:14px}
      .choice-tag{min-width:34px;min-height:34px;font-size:17px}
    }

  
    /* 強制單螢幕遊戲版型：避免卡片內容撐高整頁 */
    #gameScreen{
      height:100%;
      min-height:0;
      overflow:hidden;
      display:none;
    }
    #gameScreen.active{
      display:grid;
      grid-template-rows:auto auto auto auto minmax(0,1fr);
    }
    .shell{
      height:var(--app-height,100dvh);
      min-height:0;
      overflow:hidden;
    }
    .topbar{
      position:relative;
      flex:none;
    }
    .tickets{
      min-height:0;
      height:100%;
      overflow:hidden;
      grid-template-rows:repeat(3,minmax(0,1fr));
      align-content:stretch;
    }
    .ticket{
      min-height:0;
      height:100%;
      overflow:hidden;
    }
    .paper{
      min-height:0 !important;
      height:100%;
      max-height:100%;
      overflow:hidden;
      padding:8px 14px 7px;
      border-radius:14px;
    }
    .choice-tag{
      min-width:34px;
      min-height:34px;
      font-size:17px;
      border-radius:0 0 11px 0;
    }
    .ticket-head{
      font-size:12px;
      line-height:1.05;
      margin:0 0 3px;
    }
    .ticket-rule{
      border-top-width:2px;
      margin:0 0 2px;
    }
    .ticket-number{
      font-size:clamp(22px,6.7vw,31px);
      line-height:1;
      margin:2px 0 3px;
    }
    .ticket-foot{
      padding-top:4px;
      font-size:9.5px;
      line-height:1;
      gap:5px;
    }
    .ticket-amount b{
      font-size:13px;
    }
    .prize-reveal{
      position:absolute;
      right:8px;
      top:7px;
      margin:0;
      padding:3px 7px;
      border-radius:8px;
      background:rgba(255,255,255,.92);
      font-size:11px;
    }
    .ticket.revealed .prize-reveal{
      display:block;
    }

    @media (max-height:850px){
      .topbar{padding:2px 2px 3px}
      .stat{padding:4px 7px}
      .stat small{font-size:9px}
      .stat strong{font-size:14px}
      .timer{width:54px;height:54px}
      .timer::before{inset:5px}
      .timer span{font-size:16px}
      .progress{height:4px;margin-bottom:5px}
      .draw-card{padding:8px 13px;margin-bottom:4px;border-radius:16px}
      .draw-label{font-size:9px}
      .draw-number{font-size:26px;margin-top:0}
      .prompt{font-size:15px;line-height:1.1;margin:1px 0 4px}
      .tickets{gap:5px;padding-bottom:3px}
    }

    @media (max-height:700px){
      .stat small{display:none}
      .topbar{grid-template-columns:1fr 50px 1fr}
      .timer{width:48px;height:48px}
      .draw-card{padding:6px 12px}
      .draw-label{display:none}
      .draw-number{font-size:23px}
      .prompt{font-size:14px}
      .paper{padding:6px 12px 5px}
      .ticket-head{font-size:10px}
      .ticket-number{font-size:21px}
      .ticket-foot{font-size:8.5px}
      .ticket-amount b{font-size:11px}
    }

  
    /* 比例微調版：上方資訊放大、題目卡片縮小、卡片內空間利用提高 */
    .topbar{
      grid-template-columns:1.12fr 72px 1.12fr;
      gap:10px;
      padding:5px 2px 5px;
    }
    .stat{
      padding:8px 11px;
      border-radius:16px;
    }
    .stat small{
      font-size:11px;
    }
    .stat strong{
      font-size:18px;
    }
    .timer{
      width:68px;
      height:68px;
    }
    .timer span{
      font-size:21px;
    }
    .progress{
      height:6px;
      margin-bottom:7px;
    }

    .draw-card{
      padding:15px 16px 14px;
      margin-bottom:7px;
      border-radius:22px;
    }
    .draw-label{
      font-size:13px;
      letter-spacing:1.8px;
    }
    .draw-number{
      font-size:clamp(34px,9.2vw,46px);
      line-height:1.05;
      margin-top:3px;
    }
    .prompt{
      font-size:clamp(18px,5vw,24px);
      margin:2px 0 6px;
    }

    .tickets{
      gap:5px;
      padding:0 2px 3px;
    }
    .paper{
      padding:5px 10px 5px;
      border-radius:12px;
    }
    .choice-tag{
      min-width:31px;
      min-height:31px;
      font-size:16px;
      padding:0 8px;
      border-radius:0 0 10px 0;
    }
    .ticket-head{
      font-size:11px;
      line-height:1;
      margin:0 0 2px;
      letter-spacing:.8px;
    }
    .ticket-rule{
      margin:0 0 1px;
      border-top-width:1.5px;
    }
    .ticket-number{
      font-size:clamp(24px,7.2vw,32px);
      margin:1px 0 2px;
      line-height:.98;
      letter-spacing:0;
    }
    .ticket-foot{
      padding-top:3px;
      font-size:9px;
      gap:4px;
      grid-template-columns:1fr auto;
    }
    .ticket-date,
    .ticket-amount{
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ticket-amount b{
      font-size:13px;
    }

    @media (max-height:760px){
      .topbar{
        grid-template-columns:1.1fr 62px 1.1fr;
        gap:7px;
      }
      .stat{
        padding:6px 8px;
      }
      .stat small{
        font-size:10px;
      }
      .stat strong{
        font-size:16px;
      }
      .timer{
        width:60px;
        height:60px;
      }
      .timer span{
        font-size:18px;
      }
      .draw-card{
        padding:11px 14px 10px;
      }
      .draw-label{
        font-size:11px;
      }
      .draw-number{
        font-size:31px;
      }
      .prompt{
        font-size:16px;
      }
      .paper{
        padding:4px 9px;
      }
      .ticket-head{
        font-size:10px;
      }
      .ticket-number{
        font-size:23px;
      }
      .ticket-foot{
        font-size:8px;
      }
      .ticket-amount b{
        font-size:11px;
      }
    }

  
    /* 最新調整：移除時間、放大發票文字與上方答題資訊 */
    .topbar{
      grid-template-columns:1.18fr 78px 1.18fr;
      gap:10px;
      padding:7px 2px 6px;
    }
    .stat{
      padding:10px 12px;
      border-radius:17px;
    }
    .stat small{
      display:block !important;
      font-size:12px;
      line-height:1.1;
    }
    .stat strong{
      font-size:21px;
      line-height:1.1;
    }
    .timer{
      width:74px;
      height:74px;
    }
    .timer span{
      font-size:23px;
    }

    .ticket-head{
      font-size:13px;
      letter-spacing:1px;
      margin-bottom:3px;
    }
    .ticket-number{
      font-size:clamp(28px,8vw,36px);
      line-height:1;
      margin:2px 0 4px;
    }
    .ticket-foot{
      font-size:11px;
      padding-top:4px;
      gap:6px;
    }
    .ticket-amount b{
      font-size:16px;
    }

    @media (max-height:760px){
      .topbar{
        grid-template-columns:1.15fr 68px 1.15fr;
      }
      .stat{
        padding:8px 10px;
      }
      .stat small{
        font-size:11px;
      }
      .stat strong{
        font-size:19px;
      }
      .timer{
        width:66px;
        height:66px;
      }
      .timer span{
        font-size:20px;
      }
      .ticket-head{
        font-size:12px;
      }
      .ticket-number{
        font-size:27px;
      }
      .ticket-foot{
        font-size:10px;
      }
      .ticket-amount b{
        font-size:14px;
      }
    }

    @media (max-height:700px){
      .stat small{
        display:block !important;
        font-size:10px;
      }
      .stat strong{
        font-size:17px;
      }
      .ticket-number{
        font-size:25px;
      }
      .ticket-foot{
        font-size:9px;
      }
    }

  
    /* 最新需求：移除日期、金額置中、題目文字放大 */
    .paper{
      padding:7px 10px 6px;
    }
    .ticket-head{
      font-size:15px;
      line-height:1.05;
      margin-bottom:4px;
      letter-spacing:1.1px;
    }
    .ticket-rule{
      margin-bottom:2px;
    }
    .ticket-number{
      font-size:clamp(32px,9vw,42px);
      line-height:1;
      margin:3px 0 5px;
      letter-spacing:.2px;
    }
    .ticket-foot{
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      border-top:2px dotted #bfa77f;
      padding-top:5px;
      font-size:14px;
      font-weight:900;
    }
    .ticket-date{
      display:none !important;
    }
    .ticket-amount{
      width:100%;
      text-align:center;
      overflow:visible;
      text-overflow:clip;
    }
    .ticket-amount b{
      font-size:20px;
    }

    @media (max-height:760px){
      .ticket-head{
        font-size:13px;
      }
      .ticket-number{
        font-size:30px;
      }
      .ticket-foot{
        font-size:12px;
      }
      .ticket-amount b{
        font-size:17px;
      }
    }

    @media (max-height:700px){
      .ticket-head{
        font-size:12px;
      }
      .ticket-number{
        font-size:27px;
      }
      .ticket-foot{
        font-size:11px;
      }
      .ticket-amount b{
        font-size:15px;
      }
    }

  </style>
</head>
<body>
<div class="app">
  <main class="shell">
    <section id="startScreen" class="screen active center">
      <div class="logo">🧾</div>
      <h1>發票神探</h1>
      <div class="subtitle">1分鐘對獎挑戰</div>
      <p class="intro">重溫一張一張核對發票號碼的期待感。每題從三張發票中，選出獎金最高的一張！</p>
      <div class="rule-card">
        <div><b>⏱️</b><span>限時60秒，時間到立即結算。</span></div>
        <div><b>🔎</b><span>每題至少一張中獎，且只有一張獎金最高。</span></div>
        <div><b>🔥</b><span>連續答對可累積連擊；連擊越高，獎金加碼越多。</span></div>
        <div><b>💰</b><span>獎金依頭獎末碼規則：20萬、4萬、1萬、4千、1千、200元。</span></div>
      </div>
      <button id="startBtn" class="primary">開始對獎</button>
      <div class="fine">本遊戲號碼及獎金均為模擬內容，不具實際兌領效力。</div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="topbar">
        <div class="stat"><small>完成／答對</small><strong><span id="answered">0</span>／<span id="correct">0</span></strong></div>
        <div id="timerRing" class="timer"><span id="time">60</span></div>
        <div class="stat right"><small>目前連擊</small><strong>🔥 <span id="combo">0</span></strong></div>
      </div>
      <div class="progress"><i id="timeBar"></i></div>

      <div class="draw-card">
        <div class="draw-label">本題兌獎號碼</div>
        <div id="winningNumber" class="draw-number">AB 12345678</div>
      </div>

      <div class="prompt">哪一張發票的獎金最高？</div>
      <div id="tickets" class="tickets"></div>
    </section>

    <section id="resultScreen" class="screen center">
      <div class="logo">🏆</div>
      <h1>對獎完成！</h1>
      <div id="rank" class="rank">發票神探</div>
      <div class="result-card">
        <div class="result-grid">
          <div class="result-item"><small>完成題數</small><strong id="finalAnswered">0</strong></div>
          <div class="result-item"><small>答對題數</small><strong id="finalCorrect">0</strong></div>
          <div class="result-item"><small>正確率</small><strong id="finalAccuracy">0%</strong></div>
          <div class="result-item"><small>最高連擊</small><strong id="finalCombo">0</strong></div>
          <div class="result-item"><small>連擊加碼獎金</small><strong id="finalBonus">$0</strong></div>
          <div class="result-item total"><small>累積虛擬中獎金額</small><strong id="finalPrize">$0</strong></div>
        </div>
      </div>
      <button id="restartBtn" class="primary">再玩一次</button>
    </section>
  </main>
</div>
<div id="feedback" class="feedback"></div>

<script>
(() => {
  const GAME_SECONDS = 60;
  const PREFIX = "AB";
  const PRIZES = [
    { digits: 8, amount: 200000 },
    { digits: 7, amount: 40000 },
    { digits: 6, amount: 10000 },
    { digits: 5, amount: 4000 },
    { digits: 4, amount: 1000 },
    { digits: 3, amount: 200 },
    { digits: 0, amount: 0 }
  ];

  const $ = id => document.getElementById(id);
  const screens = {
    start: $("startScreen"),
    game: $("gameScreen"),
    result: $("resultScreen")
  };

  let state = {};
  let timerId = null;
  let locked = false;

  function resetState() {
    state = {
      timeLeft: GAME_SECONDS,
      answered: 0,
      correct: 0,
      combo: 0,
      maxCombo: 0,
      totalPrize: 0,
      comboBonusTotal: 0,
      winningDigits: "",
      tickets: [],
      bestIndex: -1
    };
  }

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function randomDigits(length = 8) {
    return Array.from({length}, () => Math.floor(Math.random() * 10)).join("");
  }

  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function getPrize(number, winner) {
    for (const prize of PRIZES) {
      if (prize.digits === 0) return 0;
      if (number.slice(-prize.digits) === winner.slice(-prize.digits)) return prize.amount;
    }
    return 0;
  }

  function makeNumberForMatch(winner, digits) {
    if (digits === 8) return winner;

    if (digits === 0) {
      let n;
      do {
        n = randomDigits(8);
      } while (getPrize(n, winner) !== 0);
      return n;
    }

    // 保留指定末碼，並強制「再前一碼」不同，
    // 確保只會中指定獎項，不會意外升級成更高獎金。
    const suffix = winner.slice(-digits);
    const prefixLength = 8 - digits;
    const winnerPrefix = winner.slice(0, prefixLength);

    let head;
    do {
      head = randomDigits(prefixLength);
    } while (
      head === winnerPrefix ||
      head.slice(-1) === winnerPrefix.slice(-1)
    );

    return head + suffix;
  }

  function difficultyLevel() {
    const elapsed = GAME_SECONDS - state.timeLeft;
    if (elapsed < 40) return 1;
    if (elapsed < 80) return 2;
    return 3;
  }

  function choosePrizePattern(level) {
    const easy = [
      [8,3,0], [7,3,0], [6,3,0], [8,4,3],
      [7,4,0], [6,3,3]
    ];
    const medium = [
      [7,6,3], [6,5,4], [8,6,5], [5,4,3],
      [7,5,4], [6,4,3]
    ];
    const hard = [
      [8,7,6], [7,6,5], [6,5,4], [5,4,3],
      [8,7,5], [7,6,4]
    ];
    const pool = level === 1 ? easy : level === 2 ? medium : hard;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function generateQuestion() {
    locked = false;

    let attempts = 0;
    do {
      attempts++;
      state.winningDigits = randomDigits(8);
      const pattern = shuffle(choosePrizePattern(difficultyLevel()));
      const usedNumbers = new Set();

      state.tickets = pattern.map(matchDigits => {
        let number;
        do {
          number = makeNumberForMatch(state.winningDigits, matchDigits);
        } while (usedNumbers.has(number));
        usedNumbers.add(number);
        return { number, prize: getPrize(number, state.winningDigits) };
      });

      const prizes = state.tickets.map(t => t.prize);
      const maxPrize = Math.max(...prizes);
      const maxCount = prizes.filter(p => p === maxPrize).length;
      const uniquePrizeCount = new Set(prizes).size;

      if (maxCount === 1 && uniquePrizeCount === 3) {
        state.bestIndex = prizes.indexOf(maxPrize);
        break;
      }
    } while (attempts < 50);

    renderQuestion();
  }

  function formatNumber(digits) {
    return `${PREFIX} ${digits}`;
  }

  function formatMoney(amount) {
    return "$" + amount.toLocaleString("zh-TW");
  }

  function renderQuestion() {
    $("winningNumber").textContent = formatNumber(state.winningDigits);
    const container = $("tickets");
    container.innerHTML = "";

    state.tickets.forEach((ticket, index) => {
      const button = document.createElement("button");
      button.className = "ticket";
      button.setAttribute("aria-label", `發票${String.fromCharCode(65 + index)}，號碼${formatNumber(ticket.number)}`);
      const amount = (Math.floor(Math.random()*900)+100).toLocaleString();
      button.innerHTML = `
        <div class="paper">
          <div class="choice-tag">${index + 1}</div>
          <div class="ticket-head">電子發票證明聯</div>
          <div class="ticket-rule"></div>
          <div class="ticket-number">${formatNumber(ticket.number)}</div>
          <div class="ticket-foot">
            <span class="ticket-amount">金額 <b>${amount}</b> 元</span>
          </div>
          <div class="prize-reveal">${formatMoney(ticket.prize)}</div>
        </div>`;
      button.addEventListener("click", () => chooseTicket(index));
      container.appendChild(button);
    });
  }

  function getComboBonusRate(combo) {
    if (combo >= 10) return 1.00; // +100%
    if (combo >= 7) return 0.65;  // +65%
    if (combo >= 5) return 0.40;  // +40%
    if (combo >= 3) return 0.20;  // +20%
    return 0;
  }

  function chooseTicket(index) {
    if (locked || state.timeLeft <= 0) return;
    locked = true;
    state.answered++;

    const isCorrect = index === state.bestIndex;
    let basePrize = 0;
    let comboBonus = 0;

    if (isCorrect) {
      state.correct++;
      state.combo++;
      state.maxCombo = Math.max(state.maxCombo, state.combo);

      basePrize = state.tickets[index].prize;
      const bonusRate = getComboBonusRate(state.combo);
      comboBonus = Math.round(basePrize * bonusRate);

      state.totalPrize += basePrize + comboBonus;
      state.comboBonusTotal += comboBonus;
    } else {
      state.combo = 0;
    }

    const buttons = [...document.querySelectorAll(".ticket")];
    buttons.forEach((button, i) => {
      button.disabled = true;
      button.classList.add("revealed");
      if (i === state.bestIndex) button.classList.add("correct");
      else if (i === index && !isCorrect) button.classList.add("wrong");
      else button.classList.add("dim");
    });

    updateStats();
    showFeedback(isCorrect, state.tickets[state.bestIndex].prize, comboBonus);
    if (isCorrect) showComboMilestone();

    setTimeout(() => {
      if (state.timeLeft > 0) generateQuestion();
    }, 760);
  }

  function showFeedback(ok, bestPrize, comboBonus = 0) {
    const el = $("feedback");
    el.className = `feedback ${ok ? "ok" : "no"} show`;

    if (ok) {
      el.textContent = comboBonus > 0
        ? `答對！${formatMoney(bestPrize)}＋連擊獎勵 ${formatMoney(comboBonus)}`
        : `答對了！＋${formatMoney(bestPrize)}`;
    } else {
      el.textContent = `再仔細看一眼！`;
    }

    setTimeout(() => el.classList.remove("show"), 760);
  }

  function showComboMilestone() {
    const labels = {
      3:"🔥 3連擊・手氣不錯",
      5:"🔥 5連擊・對獎達人",
      8:"⚡ 8連擊・發票獵人",
      10:"🏆 10連擊・發票神探",
      15:"👑 15連擊・發票之神"
    };
    if (!labels[state.combo]) return;
    const el = document.createElement("div");
    el.className = "combo-pop";
    el.textContent = labels[state.combo];
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
    if (navigator.vibrate) navigator.vibrate([45,30,70]);
  }

  function updateStats() {
    $("answered").textContent = state.answered;
    $("correct").textContent = state.correct;
    $("combo").textContent = state.combo;
    $("time").textContent = state.timeLeft;
    const pct = Math.max(0, state.timeLeft / GAME_SECONDS * 100);
    $("timeBar").style.width = pct + "%";
    $("timerRing").style.background = `conic-gradient(var(--orange) ${pct}%, #eadfce 0)`;
    $("timerRing").classList.toggle("danger", state.timeLeft <= 10);
  }

  function startGame() {
    clearInterval(timerId);
    resetState();
    showScreen("game");
    updateStats();
    generateQuestion();

    timerId = setInterval(() => {
      state.timeLeft--;
      updateStats();
      if (state.timeLeft <= 0) finishGame();
    }, 1000);
  }

  function rankName(accuracy) {
    if (accuracy >= 95) return "👑 發票之神";
    if (accuracy >= 90) return "🏆 發票神探";
    if (accuracy >= 80) return "🔥 對獎達人";
    if (accuracy >= 70) return "✨ 發票高手";
    if (accuracy >= 60) return "🧾 發票新手";
    return "🍀 下次一定中";
  }

  function finishGame() {
    clearInterval(timerId);
    timerId = null;
    locked = true;
    document.querySelectorAll(".ticket").forEach(b => b.disabled = true);

    const accuracy = state.answered ? state.correct / state.answered * 100 : 0;
    $("finalAnswered").textContent = state.answered;
    $("finalCorrect").textContent = state.correct;
    $("finalAccuracy").textContent = accuracy.toFixed(1) + "%";
    $("finalCombo").textContent = state.maxCombo;
    $("finalBonus").textContent = formatMoney(state.comboBonusTotal);
    $("finalPrize").textContent = formatMoney(state.totalPrize);
    $("rank").textContent = rankName(accuracy);
    showScreen("result");
  }

  $("startBtn").addEventListener("click", startGame);
  $("restartBtn").addEventListener("click", startGame);
})();
</script>

<script>
(function(){
  function setAppHeight(){
    var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight, {passive:true});
  window.addEventListener('orientationchange', setAppHeight, {passive:true});
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', setAppHeight, {passive:true});
    window.visualViewport.addEventListener('scroll', setAppHeight, {passive:true});
  }
})();
</script>

</body>
</html>
